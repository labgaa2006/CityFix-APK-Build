name: Build CityFix Flutter APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Regenerate the Android project files without losing the custom AndroidManifest.xml
      - name: Recreate platform folders safely
        run: |
          mv android android_backup || true
          flutter create --platforms=android --org Cityfix .
          cp android_backup/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml || true

      - name: Fix Application ID for Firebase
        run: sed -i "s/applicationId \".*\"/applicationId \"Cityfix.app\"/g" android/app/build.gradle

      - name: Add google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CityFix-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
